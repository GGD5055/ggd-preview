<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" aria-label="代表イラスト">
  <defs>
    <radialGradient id="bgWarm" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="55%" stop-color="#ffe4c2"/>
      <stop offset="100%" stop-color="#ffc89b"/>
    </radialGradient>
    <linearGradient id="beamW" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff8c8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd862" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamCl" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dff3ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7de0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairDark" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="100%" stop-color="#1f130a"/>
    </linearGradient>
    <pattern id="floral" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#fbf6ec"/>
      <g transform="translate(6 6)">
        <circle cx="3" cy="3" r="2.2" fill="#e8a4a6"/>
        <circle cx="0" cy="3" r="1.2" fill="#e8a4a6"/>
        <circle cx="6" cy="3" r="1.2" fill="#e8a4a6"/>
        <circle cx="3" cy="0" r="1.2" fill="#e8a4a6"/>
        <circle cx="3" cy="6" r="1.2" fill="#e8a4a6"/>
        <circle cx="3" cy="3" r="0.9" fill="#c97e30"/>
      </g>
      <g transform="translate(20 22)">
        <circle cx="3" cy="3" r="1.8" fill="#e6c86b"/>
        <circle cx="0" cy="3" r="1" fill="#9fb37a"/>
        <circle cx="6" cy="3" r="1" fill="#9fb37a"/>
      </g>
    </pattern>
    <clipPath id="circleClipR">
      <circle cx="200" cy="220" r="190"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="220" r="190" fill="url(#bgWarm)"/>

  <g clip-path="url(#circleClipR)">
    <!-- Light beams -->
    <polygon points="40,0 110,0 170,440 120,440" fill="url(#beamW)"/>
    <polygon points="290,0 360,0 280,440 230,440" fill="url(#beamCl)"/>

    <!-- Sparkles -->
    <g fill="#ffffff" opacity="0.9">
      <path d="M72 98 l5 11 11 5 -11 5 -5 11 -5 -11 -11 -5 11 -5z"/>
      <path d="M332 104 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4z"/>
      <path d="M340 304 l4 9 9 4 -9 4 -4 9 -4 -9 -9 -4 9 -4z"/>
    </g>
    <g>
      <circle cx="80" cy="210" r="4" fill="#ffd862"/>
      <circle cx="326" cy="220" r="4" fill="#ff9ec7"/>
      <circle cx="110" cy="380" r="4" fill="#7de0ff"/>
      <circle cx="312" cy="380" r="4" fill="#b8a3ff"/>
    </g>

    <!-- Back hair (long, tied low) -->
    <path d="M272 210
             C 304 238 318 288 312 344
             C 306 392 286 420 268 438
             C 272 400 260 340 256 300
             C 252 268 254 236 258 218 Z"
          fill="url(#hairDark)"/>
    <path d="M128 210
             C 102 240 92 286 100 340
             C 108 384 126 416 142 434
             C 136 396 146 344 150 300
             C 154 268 150 234 146 218 Z"
          fill="url(#hairDark)"/>
    <!-- Low ponytail tie -->
    <ellipse cx="200" cy="330" rx="22" ry="9" fill="#3a1e0e" stroke="#1b0f05" stroke-width="2"/>

    <!-- Body / floral blouse -->
    <path d="M68 482 C 84 380 144 338 200 338 C 256 338 316 380 332 482 Z" fill="url(#floral)"/>
    <!-- Neckline -->
    <path d="M172 348 Q200 380 228 348" fill="#fbf6ec" stroke="#d9b687" stroke-width="1.5"/>
    <!-- Silver necklace -->
    <path d="M176 352 Q200 390 224 352" stroke="#c8cdd3" stroke-width="1.5" fill="none"/>
    <path d="M200 388 L196 396 L200 402 L204 396 Z" fill="#c8cdd3" stroke="#7a8088" stroke-width="1"/>

    <!-- Neck -->
    <rect x="184" y="298" width="32" height="42" rx="10" fill="#f6d9b3"/>
    <path d="M184 316 Q200 332 216 316" fill="#dfb58a" opacity="0.55"/>

    <!-- Face (round soft) -->
    <ellipse cx="200" cy="246" rx="84" ry="92" fill="#ffe2bf"/>
    <!-- Soft jaw shade -->
    <path d="M124 252 Q136 326 200 338 Q162 320 146 274 Z" fill="#ecbf90" opacity="0.4"/>

    <!-- Hair: top & bangs -->
    <path d="M122 228
             C 118 152 162 110 200 110
             C 240 110 284 154 282 226
             C 278 206 262 192 244 188
             C 238 196 224 202 214 202
             L 218 186
             Q 200 176 182 188
             L 188 204
             C 176 204 162 198 154 188
             C 140 192 126 206 122 228 Z"
          fill="url(#hairDark)"/>

    <!-- Bangs (heavy, straight-ish with gap) -->
    <path d="M138 196
             C 152 232 170 242 186 244
             L 180 204
             Q 170 196 158 200 Z" fill="url(#hairDark)"/>
    <path d="M262 196
             C 248 232 230 242 214 244
             L 220 204
             Q 230 196 242 200 Z" fill="url(#hairDark)"/>

    <!-- Side tendrils (falling by cheeks) -->
    <path d="M130 230 C 118 278 124 324 140 356"
          stroke="#281810" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M270 230 C 282 278 276 324 260 356"
          stroke="#281810" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Thinner inner stray -->
    <path d="M152 240 Q148 282 158 316" stroke="#281810" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M248 240 Q252 282 242 316" stroke="#281810" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hair shine -->
    <path d="M170 138 Q200 126 230 138" stroke="#7a4a2a" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Ears -->
    <ellipse cx="120" cy="258" rx="8" ry="12" fill="#f6d9b3"/>
    <ellipse cx="280" cy="258" rx="8" ry="12" fill="#f6d9b3"/>

    <!-- Eyebrows -->
    <path d="M158 232 Q172 226 186 232" stroke="#2a1a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M214 232 Q228 226 242 232" stroke="#2a1a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes (almond, gentle) -->
    <g>
      <path d="M158 258 Q172 250 188 258 Q172 268 158 258 Z" fill="#ffffff"/>
      <path d="M212 258 Q228 250 242 258 Q228 268 212 258 Z" fill="#ffffff"/>
      <ellipse cx="173" cy="258" rx="8" ry="9" fill="#2b1a10"/>
      <ellipse cx="227" cy="258" rx="8" ry="9" fill="#2b1a10"/>
      <circle cx="173" cy="256" r="3" fill="#5c3420"/>
      <circle cx="227" cy="256" r="3" fill="#5c3420"/>
      <circle cx="170" cy="254" r="1.8" fill="#ffffff"/>
      <circle cx="224" cy="254" r="1.8" fill="#ffffff"/>
    </g>
    <!-- Upper lash line -->
    <path d="M158 258 Q172 250 188 258" stroke="#2a1a10" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M212 258 Q228 250 242 258" stroke="#2a1a10" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Eyelashes tips -->
    <path d="M188 258 Q192 254 196 256" stroke="#2a1a10" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M212 258 Q208 254 204 256" stroke="#2a1a10" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Cheeks (rosy) -->
    <ellipse cx="148" cy="286" rx="16" ry="10" fill="#f29999" opacity="0.6"/>
    <ellipse cx="252" cy="286" rx="16" ry="10" fill="#f29999" opacity="0.6"/>

    <!-- Nose -->
    <path d="M198 276 Q202 286 198 290" stroke="#c9986a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth (soft pink, gentle smile) -->
    <path d="M184 306 Q200 316 216 306" stroke="#c05770" stroke-width="3" fill="#e98aa0" stroke-linejoin="round"/>
    <path d="M188 306 Q200 312 212 306" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Ring -->
  <circle cx="200" cy="220" r="190" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <circle cx="200" cy="220" r="196" fill="none" stroke="#ffc89b" stroke-width="3" opacity="0.55" stroke-dasharray="4 8"/>
</svg>
