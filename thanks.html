<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>お問い合わせありがとうございました｜GRowGLowDesign</title>
<link rel="stylesheet" href="assets/css/main.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 20%, #1a2e7a 0%, #0a1a48 60%, #050d2a 100%); color: #f0f0f8; }
  .thanks-box { max-width: 560px; text-align: center; padding: 56px 32px; background: rgba(19,40,104,0.6); border: 1px solid rgba(232,196,74,0.25); border-radius: 20px; box-shadow: 0 18px 60px rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
  .thanks-logo { display: block; margin: 0 auto; width: 140px; height: auto; filter: drop-shadow(0 0 20px rgba(255, 208, 77, 0.4)) drop-shadow(0 0 50px rgba(32, 96, 208, 0.3)); }
  .thanks-title { font-family: 'Quicksand','Noto Sans JP',sans-serif; font-size: 1.6rem; margin: 24px 0 12px; color: #ffe494; font-weight: 400; line-height: 1.6; }
  .thanks-desc { color: #c8d0e0; line-height: 1.9; margin: 0 0 28px; font-size: 0.95rem; }
  .thanks-desc a { color: #ffe494; }
  .thanks-btn { display: inline-block; padding: 14px 36px; background: linear-gradient(135deg,#e8c44a,#b89420); color: #0a1a48; border-radius: 999px; text-decoration: none; font-weight: 700; letter-spacing: 0.08em; box-shadow: 0 8px 24px rgba(232,196,74,0.3); }
</style>
</head>
<body>
  <div class="thanks-box">
    <img src="assets/images/logo.png" alt="GRowGLowDesign" class="thanks-logo">
    <h1 class="thanks-title">お問い合わせ<br>ありがとうございました</h1>
    <p class="thanks-desc">
      お問い合わせを受付いたしました。<br>
      通常1営業日以内にご返信いたします。<br>
      お急ぎの場合は <a href="tel:0523864119">052-386-4119</a> までお電話ください。
    </p>
    <a href="index.html" class="thanks-btn">トップへ戻る</a>
  </div>
</body>
</html>
